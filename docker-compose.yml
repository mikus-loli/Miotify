services:
  miotify:
    build:
      context: .
      dockerfile: Dockerfile
    image: miotify:latest
    container_name: miotify
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - JWT_EXPIRES_IN=7d
      - DEFAULT_ADMIN_USER=${DEFAULT_ADMIN_USER:-admin}
      - DEFAULT_ADMIN_PASS=${DEFAULT_ADMIN_PASS:-admin}
    volumes:
      - miotify-data:/app/data
      - ./plugins/available:/app/plugins/available:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  miotify-data:
    driver: local
